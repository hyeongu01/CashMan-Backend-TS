name: CleanUp Images

on:
  workflow_dispatch:
    inputs:
      remaining_num:
        description: '유지할 이미지 수'
        required: true
        default: 15
        type: number

#env:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: "cashman-backend-ts"
          package-type: "container"
          min-versions-to-keep: inputs.remaining_num
          ignore-versions: '^latest$'
