- hosts: all
  gather_facts: false
  become: true

  vars:
    app_dir: /home/choihw/CashMan-Backend-TS
    branch: main
    image: ghcr.io/hyeongu01/cashman-backend-ts:latest
#    ghcr_username: "{{  }}"
    ghcr_password: "{{ lookup('env', 'ghcr_password') }}"


  tasks:
    - name: Login to GHCR
      community.docker.docker_login:
        registry_url: ghcr.io
        username: "{{ ghcr_username }}"
        password: "{{ ghcr_password }}"
        reauthorize: true
#      no_log: true

    - name: Pull image
      community.docker.docker_image:
        name: "{{ image }}"
        source: pull
        force_source: true

    - name: Docker image 확인
      ansible.builtin.shell: docker images
      register: result

    - name: 출력
      ansible.builtin.debug:
        msg: "{{ result }}"



